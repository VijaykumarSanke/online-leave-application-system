{% extends "base.html" %}
{% block title %}{% if edit %}Edit Leave{% else %}Apply for Leave{% endif %}{% endblock %}

{% block content %}
<div class="page-header">
  <h4 class="page-title">
    <i class="bi bi-file-earmark-plus-fill me-2 text-primary"></i>
    {% if edit %}Edit Leave Application{% else %}Apply for Leave{% endif %}
  </h4>
</div>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body p-4">

        <form method="POST"
              action="{% if edit %}{{ url_for('student_edit_leave', leave_id=leave.id) }}{% else %}{{ url_for('student_apply') }}{% endif %}"
              novalidate>

          <div class="mb-3">
            <label class="form-label fw-semibold">Leave Title / Subject <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="title"
                   value="{% if leave %}{{ leave.title }}{% endif %}"
                   placeholder="e.g. Sick Leave Request" required />
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Leave Type <span class="text-danger">*</span></label>
            <select class="form-select" name="leave_type" required>
              <option value="">-- Select Type --</option>
              {% set selected = leave.leave_type if leave else '' %}
              <option value="sick_leave"     {% if selected == 'sick_leave' %}selected{% endif %}>Sick Leave</option>
              <option value="personal_leave" {% if selected == 'personal_leave' %}selected{% endif %}>Personal Leave</option>
              <option value="emergency"      {% if selected == 'emergency' %}selected{% endif %}>Emergency</option>
              <option value="others"         {% if selected == 'others' %}selected{% endif %}>Others</option>
            </select>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">From Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" name="from_date" id="fromDate"
                     value="{% if leave %}{{ leave.from_date }}{% endif %}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">To Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" name="to_date" id="toDate"
                     value="{% if leave %}{{ leave.to_date }}{% endif %}" required />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Reason <span class="text-danger">*</span></label>
            <textarea class="form-control" name="reason" rows="4"
                      placeholder="Describe the reason for your leave..." required>{% if leave %}{{ leave.reason }}{% endif %}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send-fill me-2"></i>
              {% if edit %}Update Application{% else %}Submit Application{% endif %}
            </button>
            <a href="{{ url_for('student_my_leaves') }}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-2"></i>Cancel
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Auto-set min date for to_date when from_date changes
  document.getElementById('fromDate').addEventListener('change', function () {
    document.getElementById('toDate').min = this.value;
  });
</script>
{% endblock %}
