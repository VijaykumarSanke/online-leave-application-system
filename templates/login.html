{% extends "base.html" %}

{% block title %}Login – College Leave System{% endblock %}

{% block auth_content %}
<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h2 class="auth-title">College Leave Portal</h2>
      <p class="auth-subtitle">Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="Enter your email" required autofocus />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required />
          <button class="btn btn-outline-secondary" type="button" id="togglePw">
            <i class="bi bi-eye-fill" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>

    <!-- Demo credentials hint -->
    <div class="demo-hint">
      <small class="text-muted">
        <i class="bi bi-info-circle me-1"></i>
        <strong>Demo:</strong>
        admin@college.com / Admin@123 &nbsp;|&nbsp;
        student1@college.com / Student@123
      </small>
    </div>
  </div>
</div>
{% endblock %}
