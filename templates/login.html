{% extends "base.html" %}

{% block title %}Login - LeavePortal{% endblock %}

{% block auth_content %}
<div class="auth-bg">
  <a href="{{ url_for('index') }}" class="auth-back">
    <i class="bi bi-arrow-left"></i>
    Back
  </a>

  <div class="auth-card login-card">
    <div class="auth-header">
      <div class="auth-logo">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h2 class="auth-title">Sign in to LeavePortal</h2>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-4">
        <label for="email" class="form-label fw-bold">Email address</label>
        <div class="input-group login-input overflow-hidden px-2">
          <span class="input-group-text border-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" class="form-control border-0 shadow-none py-3" id="email" name="email"
                 placeholder="name@college.com" required autofocus />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-bold">Password</label>
        <div class="input-group login-input overflow-hidden px-2">
          <span class="input-group-text border-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control border-0 shadow-none py-3" id="password" name="password"
                 placeholder="Enter your password" required />
          <button class="btn border-0 text-muted" type="button" id="togglePw" aria-label="Show password">
            <i class="bi bi-eye-fill"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-3 login-submit">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
